version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "friday"
      time: "03:30"
      timezone: "UTC"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "fix"
      include: "scope"
    labels:
      - "dependencies"
      - "automated"
    reviewers:
      - "sharat"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    groups:
      production-dependencies:
        dependency-type: "production"
        update-types: ["version-update:semver-patch", "version-update:semver-minor"]
      dev-dependencies:
        dependency-type: "development"
        update-types: ["version-update:semver-patch", "version-update:semver-minor"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "friday"
      time: "03:30"
      timezone: "UTC"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci"
      include: "scope"
    labels:
      - "ci"
      - "dependencies"
      - "automated"
